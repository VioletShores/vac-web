<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAC Protocol — LAUNCH Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0F17;--bg-card:#151821;--bg-rail:#111318;--border:#1E2230;--teal:#2DD4BF;--emerald:#10B981;--purple:#7C3AED;--coral:#F96167;--amber:#F59E0B;--white:#FFF;--gray:#9CA3AF;--muted:#6B7280;--light:#D1D5DB}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;height:100vh}
.layout{display:flex;height:100vh}
.rail{width:240px;min-width:240px;background:var(--bg-rail);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column}
.rail-logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rail-logo img{width:36px;height:36px}
.rail-logo-text{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--teal)}
.rail-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-bottom:28px;text-transform:uppercase}
.rail-steps{flex:1}
.rail-step{display:flex;align-items:flex-start;gap:12px;padding:12px 10px;border-radius:8px;cursor:pointer;transition:all .3s;margin-bottom:4px}
.rail-step:hover{background:rgba(45,212,191,.05)}
.rail-step.active{background:rgba(45,212,191,.08)}
.rail-step.active .sn{background:var(--teal);color:var(--bg)}
.rail-step.done .sn{background:var(--emerald);color:var(--bg)}
.sn{width:26px;height:26px;min-width:26px;border-radius:50%;background:var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .3s}
.sl{font-size:12px;font-weight:600;color:var(--gray);line-height:1.3;transition:color .3s}
.rail-step.active .sl{color:var(--white)}
.rail-step.done .sl{color:var(--emerald)}
.ss{font-size:10px;color:var(--muted);margin-top:2px}
.nb{display:flex;gap:8px;margin-top:12px}
.nb button{flex:1;padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--gray);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.nb button:hover{border-color:var(--teal);color:var(--teal)}
.nb .pri{background:var(--teal);color:var(--bg);border-color:var(--teal)}
.nb .pri:hover{background:#26b8a5}
.rf{padding-top:16px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:12px}
.rf a{color:var(--teal);text-decoration:none}
.main{flex:1;overflow-y:auto;padding:40px 48px}
.sp{display:none;animation:fi .4s ease}
.sp.vis{display:block}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ph{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.pt{font-size:32px;font-weight:700;color:var(--white);margin-bottom:24px;line-height:1.2}
.cd{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:16px}
.cd.al{border-left:3px solid var(--teal)}.cd.pl{border-left-color:var(--purple)}.cd.el{border-left-color:var(--emerald)}.cd.cl{border-left-color:var(--coral)}.cd.aml{border-left-color:var(--amber)}
.ct{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;margin-bottom:8px;letter-spacing:1px}
.ct.t{color:var(--teal)}.ct.p{color:var(--purple)}.ct.e{color:var(--emerald)}.ct.a{color:var(--amber)}.ct.c{color:var(--coral)}
.cb{color:var(--gray);font-size:14px;line-height:1.6}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.mi{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:10px}
.md{width:10px;height:10px;border-radius:50%;background:var(--emerald);flex-shrink:0}
.mn{font-size:13px;color:var(--white);font-weight:500}
.ms{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--emerald);font-weight:600}
.tb{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:12px 20px;margin-top:16px}
.tbd{width:12px;height:12px;border-radius:50%;background:var(--emerald)}
.tbt{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--emerald)}
.tok{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.8;margin-top:16px}
.tk{color:var(--purple)}.tv{color:var(--light)}.ts{color:var(--teal)}.tn{color:var(--amber)}.tc{color:var(--muted);font-style:italic}
.ch{display:flex;flex-direction:column;align-items:center;gap:0;margin:20px 0}
.cn{background:var(--bg-card);border:2px solid var(--border);border-radius:10px;padding:16px 32px;text-align:center;min-width:320px}
.cn.h{border-color:var(--teal)}.cn.ag{border-color:var(--purple)}.cn.sb{border-color:var(--amber)}
.cnl{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.cn.h .cnl{color:var(--teal)}.cn.ag .cnl{color:var(--purple)}.cn.sb .cnl{color:var(--amber)}
.cnd{font-size:12px;color:var(--gray)}
.ca{font-size:20px;color:var(--muted);padding:4px 0}
.cc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--coral);letter-spacing:1px;padding:2px 0}
.al{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:16px}
.alh{background:rgba(124,58,237,.1);border-bottom:1px solid var(--border);padding:12px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--purple);letter-spacing:2px}
.ar{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);gap:16px}
.ar:last-child{border-bottom:none}
.as{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.as.ok{background:var(--emerald)}.as.bl{background:var(--coral)}
.at{font-size:13px;color:var(--light);flex:1}
.ac{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber)}
.ati{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.bg{margin-top:16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 20px}
.bgl{font-size:12px;color:var(--gray);margin-bottom:8px}
.bgb{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bgf{height:100%;background:linear-gradient(90deg,var(--teal),var(--emerald));border-radius:4px}
.bgv{display:flex;justify-content:space-between;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:12px}
.bgs{color:var(--amber)}.bgl2{color:var(--gray)}
.pvt{width:100%;border-collapse:collapse;margin-top:16px}
.pvt th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:10px 16px;border-bottom:1px solid var(--border)}
.pvt td{padding:12px 16px;font-size:13px;color:var(--light);border-bottom:1px solid var(--border)}
.pvh{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple)}
.tn2{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.tni{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.tna{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.tna.v{background:rgba(16,185,129,.15);border:1px solid var(--emerald)}
.tna.m{background:rgba(45,212,191,.15);border:1px solid var(--teal)}
.tna.u{background:rgba(107,114,128,.15);border:1px solid var(--muted)}
.tnn{font-size:13px;color:var(--white);font-weight:500}
.tns{font-size:10px;color:var(--emerald);font-family:'JetBrains Mono',monospace}
.pb{background:rgba(45,212,191,.06);border:1px solid rgba(45,212,191,.2);border-radius:10px;padding:20px 24px;margin-top:20px;text-align:center}
.pbt{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--teal);letter-spacing:3px;margin-bottom:6px}
.pbs{font-size:13px;color:var(--gray)}
.kh{position:fixed;bottom:16px;right:24px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 12px;z-index:100}
.kh kbd{background:var(--border);border-radius:3px;padding:2px 6px;font-size:10px}
</style>
</head>
<body>
<div class="layout">
<div class="rail">
<div class="rail-logo"><img src="/branding/vac-logo-icon-dark.png" alt="VAC" onerror="this.style.display='none'"><span class="rail-logo-text">VAC</span></div>
<div class="rail-sub">LAUNCH DEMO</div>
<div class="rail-steps" id="rs"></div>
<div class="nb"><button id="pb" onclick="prev()">Back</button><button class="pri" id="nb" onclick="next()">Next</button></div>
<div class="rf"><a href="https://vacprotocol.org">vacprotocol.org</a><br>Patent Pending · 558 Claims</div>
</div>
<div class="main" id="mn"></div>
</div>
<div class="kh"><kbd>←</kbd> <kbd>→</kbd> or click rail</div>
<script>
const steps=[
{n:"Verify Human",s:"6 biometric modalities",html:`<div class="ph">STEP 1</div><div class="pt">Human Verification</div><div class="cd al"><div class="ct t">MULTI-MODAL BIOMETRIC VERIFICATION</div><div class="cb">Six modalities verified simultaneously in a single recording session.</div><div class="mg"><div class="mi"><div class="md"></div><span class="mn">Face Liveness</span><span class="ms">0.95</span></div><div class="mi"><div class="md"></div><span class="mn">Deepfake Detection</span><span class="ms">0.92</span></div><div class="mi"><div class="md"></div><span class="mn">Voiceprint</span><span class="ms">0.98</span></div><div class="mi"><div class="md"></div><span class="mn">Lip-sync Correlation</span><span class="ms">0.91</span></div><div class="mi"><div class="md"></div><span class="mn">Challenge Response</span><span class="ms">0.88</span></div><div class="mi"><div class="md"></div><span class="mn">Geolocation</span><span class="ms">1.00</span></div></div></div><div class="tb"><div class="tbd"></div><div class="tbt">VERIFIED HUMAN IDENTITY · Trust Score 0.94</div></div>`},
{n:"Mint Authority Token",s:"Scope + budget + constraints",html:`<div class="ph">STEP 2</div><div class="pt">Mint Authority Token</div><div class="cd pl"><div class="ct p">VERIFIABLE AUTHORITY TOKEN (VAT)</div><div class="cb">A cryptographic credential proving a human authorised this delegation.</div><div class="tok"><span class="tc">// VAC Authority Token</span><br>{<br>&nbsp;&nbsp;<span class="tk">"jti"</span>: <span class="ts">"vat_root_a7c3e9f2"</span>,<br>&nbsp;&nbsp;<span class="tk">"sub"</span>: <span class="ts">"rob@violetshores.com"</span>,<br>&nbsp;&nbsp;<span class="tk">"role"</span>: <span class="ts">"Research Coordinator"</span>,<br>&nbsp;&nbsp;<span class="tk">"scope"</span>: [<span class="ts">"research"</span>, <span class="ts">"api_calls"</span>, <span class="ts">"summarise"</span>],<br>&nbsp;&nbsp;<span class="tk">"budget_usd"</span>: <span class="tn">500.00</span>,<br>&nbsp;&nbsp;<span class="tk">"max_tokens"</span>: <span class="tn">200000</span>,<br>&nbsp;&nbsp;<span class="tk">"ttl_hours"</span>: <span class="tn">24</span>,<br>&nbsp;&nbsp;<span class="tk">"can_delegate"</span>: <span class="tn">true</span>,<br>&nbsp;&nbsp;<span class="tk">"trust_score"</span>: <span class="tn">0.94</span>,<br>&nbsp;&nbsp;<span class="tk">"sig"</span>: <span class="ts">"ed25519:9f2a...c8d1"</span><br>}</div></div>`},
{n:"Delegate to Agent",s:"Monotonic narrowing",html:`<div class="ph">STEP 3</div><div class="pt">Delegation Chain</div><div class="ch"><div class="cn h"><div class="cnl">VERIFIED HUMAN</div><div class="cnd">Rob Zagarella · Trust 0.94</div><div class="cnd" style="color:var(--teal);font-size:11px;margin-top:4px">Budget: $500 · Scope: research, api_calls, summarise</div></div><div class="ca">↓</div><div class="cc">NARROWED: budget $200, scope: research + summarise only</div><div class="cn ag"><div class="cnl">AI AGENT</div><div class="cnd">Research Analyst · Inherited trust 0.89</div><div class="cnd" style="color:var(--purple);font-size:11px;margin-top:4px">Budget: $200 · Scope: research, summarise</div></div><div class="ca">↓</div><div class="cc">NARROWED: budget $50, scope: summarise only</div><div class="cn sb"><div class="cnl">SUB-AGENT</div><div class="cnd">Summary Writer · Inherited trust 0.82</div><div class="cnd" style="color:var(--amber);font-size:11px;margin-top:4px">Budget: $50 · Scope: summarise</div></div></div><div class="pb"><div class="pbt">MONOTONIC NARROWING</div><div class="pbs">Permissions can only tighten at every level. Never expand without human re-verification.</div></div>`},
{n:"Agent Executes",s:"Real-time budget tracking",html:`<div class="ph">STEP 4</div><div class="pt">Agent Executes Within Authority</div><div class="cd pl"><div class="ct p">RESEARCH ANALYST · ACTIVE TASK</div><div class="cb">"Research the top 5 AI infrastructure companies by market cap"</div></div><div class="al"><div class="alh">AGENT ACTIVITY LOG</div><div class="ar"><div class="as ok"></div><div class="at">API call: Search AI infrastructure companies</div><div class="ac">$2.40</div><div class="ati">14:03:12</div></div><div class="ar"><div class="as ok"></div><div class="at">API call: Retrieve market cap data for NVDA, MSFT, GOOG, AMZN, META</div><div class="ac">$3.80</div><div class="ati">14:03:18</div></div><div class="ar"><div class="as ok"></div><div class="at">Delegate to Summary Writer: compile findings</div><div class="ac">$1.20</div><div class="ati">14:03:24</div></div><div class="ar"><div class="as ok"></div><div class="at">Summary Writer: generated 400-word report</div><div class="ac">$0.80</div><div class="ati">14:03:31</div></div><div class="ar"><div class="as bl"></div><div class="at" style="color:var(--coral)">Attempted scope expansion: "execute trade" — BLOCKED</div><div class="ac" style="color:var(--coral)">$0.00</div><div class="ati">14:03:35</div></div></div><div class="bg"><div class="bgl">Agent Spending Card</div><div class="bgb"><div class="bgf" style="width:95.9%"></div></div><div class="bgv"><span class="bgs">$8.20 spent</span><span class="bgl2">$200.00 ceiling</span></div></div>`},
{n:"Provenance Record",s:"Cryptographic audit trail",html:`<div class="ph">STEP 5</div><div class="pt">Cryptographic Provenance Record</div><div class="cd el"><div class="ct e">COMPLETE AUDIT TRAIL</div><div class="cb">Every action cryptographically linked back to the verified human who authorised it.</div></div><table class="pvt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody><tr><td style="color:var(--teal)">Human Identity</td><td>Rob Zagarella · rob@violetshores.com</td></tr><tr><td style="color:var(--purple)">Authority Token</td><td><span class="pvh">vat_root_a7c3e9f2</span></td></tr><tr><td style="color:var(--purple)">Agent Chain</td><td>Human → Research Analyst → Summary Writer</td></tr><tr><td style="color:var(--amber)">Total Spend</td><td>$8.20 of $200.00 ceiling</td></tr><tr><td style="color:var(--emerald)">Actions Executed</td><td>4 approved, 1 blocked (scope violation)</td></tr><tr><td style="color:var(--gray)">Verification</td><td>6-modality biometric · Trust 0.94</td></tr><tr><td style="color:var(--gray)">Timestamp</td><td>2026-03-05T14:03:12Z</td></tr><tr><td style="color:var(--gray)">Chain Signature</td><td><span class="pvh">ed25519:9f2a4b...c8d1e3</span></td></tr></tbody></table><div class="pb" style="margin-top:24px"><div class="pbt">CRYPTOGRAPHIC HUMAN PROVENANCE</div><div class="pbs">Every AI action traces back to a verified human. Enforced by math, not promises.</div></div>`},
{n:"Trust Graph",s:"Network effects",html:`<div class="ph">STEP 6</div><div class="pt">Trust Graph</div><div class="cd el"><div class="ct e">VOUCH NETWORK</div><div class="cb">Verified humans vouch for each other. Inside the graph, verification is lightweight. Outside, it scales up.</div></div><div class="tn2"><div class="tni"><div class="tna v" style="color:var(--emerald)">R</div><div><div class="tnn">Rob Zagarella</div><div class="tns">VERIFIED · 0.94</div></div></div><div class="tni"><div class="tna m" style="color:var(--teal)">S</div><div><div class="tnn">Shan Zagarella</div><div class="tns">MUTUAL VOUCH · 0.91</div></div></div><div class="tni"><div class="tna v" style="color:var(--emerald)">J</div><div><div class="tnn">Trusted Investor</div><div class="tns">VOUCHED · 0.87</div></div></div><div class="tni"><div class="tna u" style="color:var(--muted)">?</div><div><div class="tnn">Unknown Contact</div><div class="tns" style="color:var(--coral)">OUTSIDE GRAPH · FULL VERIFICATION</div></div></div></div><div style="display:flex;gap:16px;margin-top:24px"><div class="cd el" style="flex:1"><div class="ct e">INSIDE TRUST GRAPH</div><div class="cb">Streamlined verification<br>1 of 6 modalities<br>Built-in — nearly free</div></div><div class="cd cl" style="flex:1"><div class="ct c">OUTSIDE TRUST GRAPH</div><div class="cb">Full verification required<br>5–6 of 6 modalities<br>Certified provider → <strong style="color:var(--coral)">revenue</strong></div></div></div><div class="pb" style="margin-top:20px"><div class="pbt">NETWORK EFFECT MEETS UNIT ECONOMICS</div><div class="pbs">More users → denser trust graph → cheaper verification → more users.</div></div>`}
];
let cur=0;
const rs=document.getElementById('rs'),mn=document.getElementById('mn');
steps.forEach((s,i)=>{rs.innerHTML+=`<div class="rail-step${i===0?' active':''}" data-step="${i}" onclick="go(${i})"><div class="sn">${i+1}</div><div><div class="sl">${s.n}</div><div class="ss">${s.s}</div></div></div>`;mn.innerHTML+=`<div class="sp${i===0?' vis':''}" id="p${i}">${s.html}</div>`});
function go(n){if(n<0||n>=steps.length)return;document.querySelectorAll('.sp').forEach(p=>p.classList.remove('vis'));document.getElementById('p'+n).classList.add('vis');document.querySelectorAll('.rail-step').forEach((s,i)=>{s.classList.remove('active');i<n?s.classList.add('done'):s.classList.remove('done');i===n&&s.classList.add('active')});cur=n;document.getElementById('pb').style.visibility=n===0?'hidden':'visible';document.getElementById('nb').textContent=n===steps.length-1?'Done':'Next'}
function next(){if(cur<steps.length-1)go(cur+1)}
function prev(){if(cur>0)go(cur-1)}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}if(e.key==='ArrowLeft'){e.preventDefault();prev()}});
go(0);
</script>
</body>
</html>
