<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAC Groups</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
:root { --bg: #0D1117; --surface: #161B22; --surface-raised: #1C2128; --border: #30363D; --text-primary: #F0F6FC; --text-secondary: #C9D1D9; --text-tertiary: #9CA3AF; --text-quaternary: #848D97; --purple: #6C5CE7; --purple-bg: rgba(108,92,231,0.08); --purple-border: rgba(108,92,231,0.25); --teal: #00CEC9; --teal-bg: rgba(0,206,201,0.08); --success: #3FB950; --success-bg: rgba(63,185,80,0.08); --success-border: rgba(63,185,80,0.2); --warning: #D29922; --warning-bg: rgba(210,153,34,0.08); --error: #F85149; --error-bg: rgba(248,81,73,0.08); --error-border: rgba(248,81,73,0.2); --radius: 10px; --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text-secondary); line-height: 1.6; }
.nav { border-bottom: 1px solid var(--border); padding: 12px 20px; background: var(--bg); position: sticky; top: 0; z-index: 50; }
.nav-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.nav-brand { font-family: var(--mono); font-weight: 700; font-size: 13px; color: var(--text-primary); letter-spacing: 2px; text-decoration: none; display: flex; align-items: center; gap: 8px; }
.nav-brand span { font-weight: 400; color: var(--text-tertiary); }
.nav-status { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); color: var(--text-quaternary); letter-spacing: 1px; }
.page { max-width: 720px; margin: 0 auto; padding: 20px 20px 80px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.card-body { padding: 16px; }
.card-header { font-family: var(--mono); font-size: 10px; color: var(--text-quaternary); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
.section-title { font-family: var(--mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 1.5px; text-transform: uppercase; margin: 20px 0 10px; display: flex; align-items: center; justify-content: space-between; }
.hero { text-align: center; margin-bottom: 24px; }
.hero-eyebrow { font-family: var(--mono); font-size: 10px; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.hero-title { font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
.hero-sub { font-size: 13px; color: var(--text-tertiary); max-width: 500px; margin: 0 auto; }
.quorum-ring { position: relative; width: 120px; height: 120px; margin: 0 auto 12px; flex-shrink: 0; }
.quorum-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.quorum-ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
.quorum-ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.quorum-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.quorum-pct { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--text-primary); }
.quorum-label { font-family: var(--mono); font-size: 9px; color: var(--text-quaternary); letter-spacing: 1px; text-transform: uppercase; }
.member-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.member-row:last-child { border-bottom: none; }
.member-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.member-dot.verified { background: var(--success); box-shadow: 0 0 4px var(--success); }
.member-dot.pending { background: var(--text-quaternary); }
.member-dot.present { background: var(--teal); box-shadow: 0 0 4px var(--teal); }
.member-name { font-size: 13px; color: var(--text-primary); flex: 1; }
.member-meta { font-family: var(--mono); font-size: 10px; color: var(--text-quaternary); }
.member-vote { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 3px; }
.member-vote.approve { background: var(--success-bg); color: var(--success); }
.member-vote.deny { background: var(--error-bg); color: var(--error); }
.member-vote.abstain { background: var(--warning-bg); color: var(--warning); }
.member-vote.waiting { background: var(--surface-raised); color: var(--text-quaternary); }
.presence-map { background: var(--surface-raised); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin: 12px 0; }
.presence-map iframe { width: 100%; height: 160px; border: none; filter: grayscale(0.3) brightness(0.85); }
.presence-map-label { font-family: var(--mono); font-size: 10px; color: var(--teal); padding: 8px 12px; display: flex; align-items: center; gap: 6px; background: var(--teal-bg); }
.model-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
.model-chip { font-family: var(--mono); font-size: 10px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-tertiary); cursor: pointer; transition: all 0.15s; }
.model-chip:hover { border-color: var(--purple-border); color: var(--purple); }
.model-chip.active { border-color: var(--purple); background: var(--purple-bg); color: var(--purple); }
.model-desc { font-family: var(--mono); font-size: 10px; color: var(--text-quaternary); padding: 8px 12px; background: var(--surface-raised); border-radius: 6px; margin-bottom: 12px; }
.btn { font-family: var(--mono); font-size: 11px; padding: 8px 16px; border-radius: 6px; border: 1px solid var(--purple-border); background: var(--purple-bg); color: var(--purple); cursor: pointer; transition: all 0.15s; }
.btn:hover { background: var(--purple); color: white; }
.btn.success { border-color: var(--success-border); background: var(--success-bg); color: var(--success); }
.btn.success:hover { background: var(--success); color: white; }
.btn.danger { border-color: var(--error-border); background: var(--error-bg); color: var(--error); }
.btn.danger:hover { background: var(--error); color: white; }
.btn.warn { border-color: rgba(210,153,34,0.3); background: var(--warning-bg); color: var(--warning); }
input, select, textarea { font-family: var(--mono); font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text-primary); width: 100%; }
input:focus, textarea:focus { outline: none; border-color: var(--purple); }
textarea { min-height: 60px; resize: vertical; }
.form-label { font-family: var(--mono); font-size: 10px; color: var(--text-quaternary); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; display: block; }
.form-group { margin-bottom: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.vote-bar { display: flex; gap: 8px; margin: 16px 0; }
.vote-bar .btn { flex: 1; text-align: center; padding: 12px; font-size: 13px; font-weight: 600; }
.patent-badge { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--purple); background: var(--purple-bg); border: 1px solid var(--purple-border); border-radius: 4px; padding: 4px 10px; }
.patent-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); }
.status-pill { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; }
.status-pill.open { background: var(--purple-bg); color: var(--purple); }
.status-pill.approved { background: var(--success-bg); color: var(--success); }
.status-pill.denied { background: var(--error-bg); color: var(--error); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>
<div class="nav"><div class="nav-inner">
    <a href="/" class="nav-brand">
        <svg width="18" height="18" viewBox="0 0 100 100"><polygon points="50,8 92,30 92,70 50,92 8,70 8,30" fill="none" stroke="#6C5CE7" stroke-width="5"/><polygon points="50,24 76,38 76,62 50,76 24,62 24,38" fill="#6C5CE7" fill-opacity="0.1" stroke="#6C5CE7" stroke-width="2.5"/></svg>
        VAC <span>PROTOCOL</span>
    </a>
    <div class="nav-status" id="navStatus">GOVERNANCE</div>
</div></div>
<div class="page" id="content"></div>
<script>
const API = 'https://vac-system-production.up.railway.app';
const params = new URLSearchParams(location.search);
const sessionParam = params.get('session');
const groupParam = params.get('group');
let emailParam = params.get('email') || 'rob@violetshores.com';
// Auto-correct common typo
if (emailParam.endsWith('@violetshores.co')) emailParam = emailParam.replace('@violetshores.co', '@violetshores.com');

// Demo scenarios — strategically chosen for investor pitch
const SCENARIOS = {
    gov_committee: {
        name: 'US Government Committee',
        desc: 'Defense budget authorization requiring physical co-presence of cleared officials',
        group_name: 'DoD AI Budget Committee',
        group_desc: 'Authorized officials must be physically co-present at an approved secure facility to approve AI agent spending above $10K',
        members: ['director@defense.gov', 'analyst@nsa.gov', 'oversight@congress.gov', 'rob@violetshores.com'],
        model: 'cultural_hui',
        locations: [
            { name: 'Pentagon, Arlington VA', lat: 38.8719, lng: -77.0563, radius: 0.3 },
            { name: 'NSA HQ, Fort Meade MD', lat: 39.1087, lng: -76.7714, radius: 0.3 },
            { name: 'Capitol Building, Washington DC', lat: 38.8899, lng: -77.0091, radius: 0.2 },
        ],
        location: 'Pentagon, Arlington VA',
        location_coords: { lat: 38.8719, lng: -77.0563 },
        radius: 0.3,
        default_proposal: 'Authorize AI research agent with $50K spending card',
        default_description: 'Deploy autonomous research agent to analyze adversary AI capabilities. Agent requires $50K token budget across classified and open-source intelligence APIs. All committee members must be physically present at an approved secure facility.',
    },
    maori_hui: {
        name: 'Māori Land Trust Hui',
        desc: 'Iwi governance requiring kanohi ki te kanohi (face to face) for land decisions',
        group_name: 'Te Rūnanga o Ngāi Tahu',
        group_desc: 'Trustees must gather kanohi ki te kanohi (face to face) at an approved marae. Digital proxies not accepted for whenua decisions.',
        members: ['kaiwhakahaere@ngaitahu.iwi.nz', 'kaumatua@ngaitahu.iwi.nz', 'shannon@folioai.com', 'rob@violetshores.com'],
        model: 'cultural_hui',
        locations: [
            { name: 'Ngā Hau e Whā Marae, Christchurch', lat: -43.5321, lng: 172.6362, radius: 0.2 },
            { name: 'Ōnuku Marae, Akaroa', lat: -43.8075, lng: 172.9681, radius: 0.2 },
            { name: 'Takahanga Marae, Kaikōura', lat: -42.4008, lng: 173.6814, radius: 0.2 },
        ],
        location: 'Ngā Hau e Whā Marae, Christchurch',
        location_coords: { lat: -43.5321, lng: 172.6362 },
        radius: 0.2,
        default_proposal: 'Approve whenua development plan for Tūāhuriri block',
        default_description: 'Proposed development of 12ha at Tūāhuriri for papakāinga housing. Requires kanohi ki te kanohi approval from all present trustees.',
    },
    board_vote: {
        name: 'Corporate Board Vote',
        desc: 'Board of directors authorizing an AI agent with a $50K spending card',
        group_name: 'Violet Shores Board',
        group_desc: 'Board members vote to authorize AI research agent. Supermajority required.',
        members: ['rob@violetshores.com', 'investor@vc.fund', 'advisor@techcorp.com', 'legal@counsel.io'],
        model: 'supermajority',
        location: null,
        location_coords: null,
        radius: 0,
        default_proposal: 'Approve $2M Series Seed at $15M post-money',
        default_description: 'Investment terms: $2M at $15M post-money. 2-year cliff, 4-year vest. Board observer seat. Supermajority of board members required.',
    },
};
let activeScenario = 'gov_committee';

function renderPresenceMap(loc, radius) {
    if (!loc) return '';
    const lat = loc.lat, lng = loc.lng, name = loc.name || 'Meeting Point';
    const zoom = radius < 0.3 ? 16 : radius < 1 ? 15 : 14;
    let h = '<div class="presence-map">';
    h += '<iframe src="https://www.openstreetmap.org/export/embed.html?bbox='+(lng-0.005)+','+(lat-0.003)+','+(lng+0.005)+','+(lat+0.003)+'&layer=mapnik&marker='+lat+','+lng+'" loading="lazy"></iframe>';
    h += '<div class="presence-map-label">◉ '+name+' · Geofence: '+radius+'km radius · All voters must be physically within this zone</div>';
    h += '</div>';
    return h;
}
const MODELS = {
    majority: { name:'Majority', desc:'More than 50% of verified members must approve.', icon:'\u{1F5F3}\uFE0F', threshold:50, presence:false },
    supermajority: { name:'Supermajority', desc:'At least 67% of verified members must approve.', icon:'\u2696\uFE0F', threshold:67, presence:false },
    unanimous: { name:'Unanimous', desc:'Every member must verify and approve. One objection blocks.', icon:'\u{1F91D}', threshold:100, presence:false },
    n_of_m: { name:'N-of-M', desc:'A specific number (N) of total members (M) must approve.', icon:'\u{1F522}', threshold:null, presence:false },
    cultural_hui: { name:'Cultural Hui', desc:'Physical co-presence required. Supermajority of present members approve. Inspired by M\u0101ori hui \u2014 kanohi ki te kanohi.', icon:'\u{1F3DB}\uFE0F', threshold:67, presence:true },
};
let currentGroup = null, currentSession = null, selectedModel = 'cultural_hui';

function init() {
    if (sessionParam) return loadSession(sessionParam);
    if (groupParam) return loadGroup(groupParam);
    showLanding();
}

function showLanding() {
    document.getElementById('content').innerHTML = `
    <div class="hero">
        <div class="hero-eyebrow">Claims 168\u2013241 \u00B7 Collective Governance</div>
        <div class="hero-title">Group Governance</div>
        <div class="hero-sub">What if an AI agent needed board approval before getting its spending card? Quorum-verified delegation with optional geolocation-enforced presence.</div>
    </div>
    
    <!-- Scenario Selector -->
    <div class="card"><div class="card-body">
        <div class="card-header">Demo Scenario</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-quaternary);margin-bottom:10px;padding:6px 10px;background:var(--surface-raised);border-radius:4px;">
            Same protocol, different governance models. The math adapts to any culture, jurisdiction, or org structure.
        </div>
        <div class="model-chips" id="scenarioChips"></div>
        <div class="model-desc" id="scenarioDesc"></div>
    </div></div>
    
    <div id="groupList"></div>
    <div class="section-title">Create Group</div>
    <div class="card"><div class="card-body">
        <div class="form-group"><label class="form-label">Group Name</label><input id="grpName" value="DoD AI Budget Committee"></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="grpDesc" rows="2" style="resize:vertical;">Authorized officials must be physically co-present in the Pentagon SCIF to approve AI agent spending above $10K</textarea></div>
        <div class="form-group"><label class="form-label">Members (email, one per line)</label><textarea id="grpMembers" rows="4">director@defense.gov\nanalyst@nsa.gov\noversight@congress.gov\nrob@violetshores.com</textarea></div>
        <div class="card-header" style="margin-top:16px;">Quorum Model</div>
        <div class="model-chips" id="modelChips"></div>
        <div class="model-desc" id="modelDesc"></div>
        <div id="presenceRow" style="display:none;">
            <div class="form-group"><label class="form-label">Approved Locations</label>
                <select id="grpLocationSelect" class="form-input" style="cursor:pointer;" onchange="updateLocationFromSelect()">
                    <option value="custom">Custom location...</option>
                </select>
            </div>
            <div class="form-row" id="customLocationRow">
                <div class="form-group"><label class="form-label">Location Name</label><input id="grpLocation" value="Pentagon, Arlington VA"></div>
                <div class="form-group"><label class="form-label">Radius (km)</label><input id="grpRadius" type="number" value="0.3" step="0.1"></div>
            </div>
            <div id="locationMapPreview"></div>
        </div>
        <div id="presenceNote" style="display:none;font-family:var(--mono);font-size:10px;color:var(--teal);margin:8px 0;padding:6px 10px;background:var(--teal-bg);border-radius:4px;">
            ⊡ Geolocation required: All voters must be within the specified radius of the meeting point. Browser location API verifies physical co-presence.
        </div>
        <button class="btn" onclick="createGroup()" style="margin-top:8px;">Create Governance Group</button>
    </div></div>
    
    <!-- Bridge to Agents -->
    <div class="card" style="border-color:var(--purple-border);background:var(--purple-bg);text-align:center;margin-top:16px;">
        <div class="card-body">
            <div style="font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--purple);margin-bottom:6px;">FROM INDIVIDUAL TO COLLECTIVE · CLAIMS 39\u2013241</div>
            <div style="font-size:13px;color:var(--text-primary);margin-bottom:4px;">Group approves → Agent gets its spending card → Same math, same chain</div>
            <div style="font-size:11px;color:var(--text-tertiary);">The agent demo shows individual delegation. This page shows what happens when the ROOT is a group instead of a single human.</div>
        </div>
    </div>`;
    renderScenarioChips();
    renderModelChips();
    loadGroupList();
    // Auto-populate location dropdown for default scenario
    setTimeout(() => applyScenario(activeScenario), 50);
}

function renderScenarioChips() {
    const el = document.getElementById('scenarioChips');
    el.innerHTML = Object.entries(SCENARIOS).map(([k,v]) =>
        '<div class="model-chip '+(k===activeScenario?'active':'')+'" onclick="applyScenario(\''+k+'\')">'+v.name+'</div>'
    ).join('');
    document.getElementById('scenarioDesc').textContent = SCENARIOS[activeScenario].desc;
}

function applyScenario(key) {
    activeScenario = key;
    const s = SCENARIOS[key];
    document.getElementById('grpName').value = s.group_name;
    document.getElementById('grpDesc').value = s.group_desc;
    document.getElementById('grpMembers').value = s.members.join('\n');
    selectedModel = s.model;
    
    // Populate location dropdown
    const sel = document.getElementById('grpLocationSelect');
    if (sel && s.locations && s.locations.length > 0) {
        sel.innerHTML = s.locations.map((loc, i) => 
            '<option value="'+i+'" data-lat="'+loc.lat+'" data-lng="'+loc.lng+'" data-radius="'+loc.radius+'">'+loc.name+' ('+loc.radius+'km)</option>'
        ).join('') + '<option value="custom">Custom location...</option>';
        sel.value = '0';
        updateLocationFromSelect();
    } else if (s.location) {
        document.getElementById('grpLocation').value = s.location;
        document.getElementById('grpRadius').value = s.radius;
    }
    renderScenarioChips();
    renderModelChips();
}

function updateLocationFromSelect() {
    const sel = document.getElementById('grpLocationSelect');
    const opt = sel.options[sel.selectedIndex];
    const customRow = document.getElementById('customLocationRow');
    const preview = document.getElementById('locationMapPreview');
    
    if (sel.value === 'custom') {
        customRow.style.display = 'grid';
        if (preview) preview.innerHTML = '';
        return;
    }
    
    const lat = parseFloat(opt.dataset.lat);
    const lng = parseFloat(opt.dataset.lng);
    const radius = parseFloat(opt.dataset.radius);
    const name = opt.textContent.split(' (')[0];
    
    document.getElementById('grpLocation').value = name;
    document.getElementById('grpRadius').value = radius;
    customRow.style.display = 'none';
    
    // Show map preview
    if (preview) {
        preview.innerHTML = renderPresenceMap({lat, lng, name}, radius);
    }
}

function renderModelChips() {
    document.getElementById('modelChips').innerHTML = Object.entries(MODELS).map(([k,v]) =>
        '<div class="model-chip '+(k===selectedModel?'active':'')+'" onclick="selectModel(\''+k+'\')">' +v.name+'</div>'
    ).join('');
    document.getElementById('modelDesc').textContent = MODELS[selectedModel].desc;
    const presRow = document.getElementById('presenceRow');
    const presNote = document.getElementById('presenceNote');
    if (presRow) presRow.style.display = MODELS[selectedModel].presence ? 'grid' : 'none';
    if (presNote) presNote.style.display = MODELS[selectedModel].presence ? 'block' : 'none';
}
function selectModel(m) { selectedModel = m; renderModelChips(); }

async function loadGroupList() {
    try {
        const r = await fetch(API+'/v1/groups?email='+encodeURIComponent(emailParam));
        const d = await r.json();
        if (d.groups && d.groups.length > 0) {
            document.getElementById('groupList').innerHTML = '<div class="section-title">Your Groups</div>' +
                d.groups.map(g => '<div class="card animate" style="cursor:pointer" onclick="location.href=\'/groups?group='+g.group_id+'&email='+encodeURIComponent(emailParam)+'\'"><div class="card-body" style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:14px;font-weight:600;color:var(--text-primary)">'+g.name+'</div><div style="font-family:var(--mono);font-size:10px;color:var(--text-quaternary)">'+g.member_count+' members \u00B7 '+(MODELS[g.quorum_model]?.icon||'')+' '+g.quorum_model+'</div></div><span style="font-family:var(--mono);font-size:10px;color:var(--purple)">\u2192</span></div></div>').join('');
        }
    } catch(e) {}
}

async function createGroup() {
    const name = document.getElementById('grpName').value.trim();
    const members = document.getElementById('grpMembers').value.trim().split('\n').map(e=>e.trim()).filter(Boolean);
    if (!name || members.length < 2) { alert('Need name + 2 members'); return; }
    const body = { name, description: document.getElementById('grpDesc').value.trim(), members, quorum_model: selectedModel, require_presence: MODELS[selectedModel].presence, presence_radius_km: parseFloat(document.getElementById('grpRadius')?.value)||0.5 };
    if (MODELS[selectedModel].presence) {
        const sel = document.getElementById('grpLocationSelect');
        const opt = sel?.options[sel.selectedIndex];
        let lat = -33.8688, lng = 151.2093;
        if (opt && sel.value !== 'custom') {
            lat = parseFloat(opt.dataset.lat);
            lng = parseFloat(opt.dataset.lng);
        }
        const locName = document.getElementById('grpLocation')?.value || 'Meeting Point';
        body.presence_location = { lat, lng, name: locName };
    }
    try {
        const r = await fetch(API+'/v1/groups', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const d = await r.json();
        if (d.group_id) location.href = '/groups?group='+d.group_id+'&email='+encodeURIComponent(emailParam);
    } catch(e) { alert(e.message); }
}

async function loadGroup(gid) {
    try {
        const g = await(await fetch(API+'/v1/groups/'+gid)).json();
        currentGroup = g;
        let sessions = [];
        try { sessions = (await(await fetch(API+'/v1/groups/sessions?group_id='+gid)).json()).sessions||[]; } catch(e){}
        renderGroupDetail(g, sessions);
    } catch(e) { showLanding(); }
}

function renderGroupDetail(group, sessions) {
    const m = MODELS[group.quorum_model]||MODELS.majority;
    const verified = group.members_detail?.filter(m=>m.verified).length||0;
    let h = '<div style="margin-bottom:16px"><div style="font-size:20px;font-weight:800;color:var(--text-primary)">'+group.name+'</div>';
    h += '<div style="font-size:13px;color:var(--text-tertiary);margin-top:4px">'+(group.description||'')+'</div>';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px"><span style="font-family:var(--mono);font-size:11px;color:var(--purple)">'+m.name+'</span><span style="font-family:var(--mono);font-size:10px;color:var(--text-quaternary)">\u00B7 '+group.member_count+' members \u00B7 '+verified+' verified</span></div></div>';
    if (group.require_presence && group.presence_location) h += renderPresenceMap(group.presence_location, group.presence_radius_km);
    h += '<div class="section-title">Members</div><div class="card"><div class="card-body">';
    (group.members_detail||group.members.map(e=>({email:e,verified:false,trust_score:0}))).forEach(mem => {
        const name = (mem.name||mem.email.split('@')[0]).replace(/\b\w/g,c=>c.toUpperCase());
        const statusText = mem.verified ? (mem.trust_score > 0 ? 'Trust: '+(mem.trust_score*100).toFixed(0)+'%' : 'VERIFIED') : 'not verified';
        h += '<div class="member-row"><div class="member-dot '+(mem.verified?'verified':'pending')+'"></div><div class="member-name">'+name+'</div><div class="member-meta">'+mem.email+' \u00B7 '+statusText+'</div></div>';
    });
    h += '</div></div>';
    h += '<div class="section-title">Sessions <button class="btn" onclick="showStartSession()" style="font-size:10px;padding:4px 10px">+ Start Session</button></div><div id="sessionForm"></div>';
    if (sessions.length) {
        sessions.forEach(s => {
            const sc = s.status==='approved'?'approved':s.status==='denied'?'denied':'open';
            h += '<div class="card animate" style="cursor:pointer" onclick="location.href=\'/groups?session='+s.session_id+'&email='+encodeURIComponent(emailParam)+'\'"><div class="card-body"><div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:14px;font-weight:600;color:var(--text-primary)">'+s.action+'</div><span class="status-pill '+sc+'">'+s.status.toUpperCase()+'</span></div><div style="font-family:var(--mono);font-size:10px;color:var(--text-quaternary);margin-top:4px">'+(s.votes||[]).length+' votes</div></div></div>';
        });
    } else h += '<div style="font-family:var(--mono);font-size:12px;color:var(--text-quaternary);padding:16px 0">No sessions yet. Start one to begin a vote.</div>';
    h += '<div style="text-align:center;margin-top:24px"><div class="patent-badge"><span class="dot"></span>Claims 168\u2013241</div></div>';
    document.getElementById('content').innerHTML = h;
}

function showStartSession() {
    const s = SCENARIOS[activeScenario] || {};
    const defProp = s.default_proposal || 'Approve budget allocation';
    const defDesc = s.default_description || 'Describe the proposal for committee review.';
    document.getElementById('sessionForm').innerHTML = '<div class="card animate"><div class="card-body"><div class="card-header">Start Governance Session</div><div class="form-group"><label class="form-label">Proposal</label><input id="sessAction" value="'+defProp.replace(/"/g,'&quot;')+'"></div><div class="form-group"><label class="form-label">Description</label><textarea id="sessDesc">'+defDesc+'</textarea></div><div class="form-row"><div class="form-group"><label class="form-label">Voting Window (minutes)</label><select id="sessTimeout" class="form-input" style="cursor:pointer;"><option value="15">15 min</option><option value="30">30 min</option><option value="60" selected>1 hour</option><option value="1440">24 hours</option><option value="10080">7 days</option></select></div></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="startSession()">Start Session</button><button class="btn" style="border-color:var(--border);color:var(--text-tertiary)" onclick="document.getElementById(\'sessionForm\').innerHTML=\'\'">Cancel</button></div></div></div>';
}

async function startSession() {
    const action = document.getElementById('sessAction').value.trim();
    if (!action) return;
    const timeout = parseInt(document.getElementById('sessTimeout')?.value || '60');
    try {
        const d = await(await fetch(API+'/v1/groups/session', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ group_id:currentGroup.group_id, action, description:document.getElementById('sessDesc').value.trim(), timeout_minutes:timeout, initiated_by:emailParam }) })).json();
        if (d.session_id) location.href = '/groups?session='+d.session_id+'&email='+encodeURIComponent(emailParam);
    } catch(e) { alert(e.message); }
}

async function loadSession(sid) {
    try {
        currentSession = await(await fetch(API+'/v1/groups/session/'+sid)).json();
        currentGroup = await(await fetch(API+'/v1/groups/'+currentSession.group_id)).json();
        renderSession(currentGroup, currentSession);
    } catch(e) { showLanding(); }
}

function renderSession(group, session) {
    const m = MODELS[group.quorum_model]||MODELS.majority;
    const votes = session.votes||[];
    const approvals = votes.filter(v=>v.vote==='approve'&&v.verified);
    const presentApprovals = approvals.filter(v=>v.is_present);
    const total = group.members?.length||group.member_count;
    const votePct = total>0?Math.round(approvals.length/total*100):0;
    const presentPct = total>0?Math.round(presentApprovals.length/total*100):0;
    const effectivePct = group.require_presence?presentPct:votePct;
    const threshPct = group.vote_threshold_pct;
    const met = effectivePct >= threshPct;
    const ringColor = met?'var(--success)':effectivePct>threshPct/2?'var(--warning)':'var(--purple)';
    const circ = 2*Math.PI*52;
    const dashOff = circ-(effectivePct/100)*circ;
    const sc = session.status==='approved'?'approved':session.status==='denied'?'denied':'open';

    let h = '<div style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-family:var(--mono);font-size:11px;color:var(--purple)">'+m.name+'</span><span class="status-pill '+sc+'">'+session.status.toUpperCase()+'</span></div>';
    h += '<div style="font-size:20px;font-weight:800;color:var(--text-primary)">'+session.action+'</div>';
    h += '<div style="font-size:13px;color:var(--text-tertiary);margin-top:4px">'+(session.description||'')+'</div>';
    h += '<div style="font-family:var(--mono);font-size:10px;color:var(--text-quaternary);margin-top:8px">'+group.name+'</div>';
    
    // Session timer + cancel
    if (session.status === 'open') {
        let timerHtml = '';
        if (session.expires_at) {
            const expires = new Date(session.expires_at);
            const now = new Date();
            const remaining = Math.max(0, expires - now);
            const mins = Math.floor(remaining / 60000);
            const hrs = Math.floor(mins / 60);
            const timeStr = hrs > 0 ? hrs + 'h ' + (mins % 60) + 'm' : mins + 'm';
            const urgent = mins < 10;
            timerHtml = '<span style="color:'+(urgent?'var(--error)':'var(--text-secondary)')+'">⏱ '+timeStr+' remaining</span>';
        }
        h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:8px 12px;background:var(--surface-raised);border-radius:6px;">';
        h += '<div style="font-family:var(--mono);font-size:11px;">'+timerHtml+'</div>';
        h += '<button class="btn danger" onclick="cancelSession()" style="font-size:10px;padding:4px 10px;">Cancel Session</button>';
        h += '</div>';
    } else if (session.status === 'cancelled') {
        h += '<div style="margin-top:8px;padding:8px 12px;background:var(--error-bg);border:1px solid var(--error-border);border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--error);">SESSION CANCELLED'+(session.cancel_reason?' — '+session.cancel_reason:'')+'</div>';
    } else if (session.status === 'expired') {
        h += '<div style="margin-top:8px;padding:8px 12px;background:var(--warning-bg);border:1px solid rgba(210,153,34,0.3);border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--warning);">SESSION EXPIRED — voting window closed before quorum was reached</div>';
    }
    h += '</div>';

    if (group.require_presence && group.presence_location) h += renderPresenceMap(group.presence_location, group.presence_radius_km);

    // Governance Authority Tree
    const treeMembers = group.members_detail || group.members.map(e=>({email:e,name:e.split('@')[0],verified:false}));
    h += '<div class="card"><div class="card-body">';
    h += '<div style="font-family:var(--mono);font-size:10px;color:var(--text-quaternary);letter-spacing:1.5px;margin-bottom:12px;">AUTHORITY CHAIN · GROUP → MEMBERS → AGENT DELEGATION</div>';
    
    // Group ROOT node
    h += '<div style="border:1.5px solid var(--purple-border);border-radius:8px;padding:12px;background:var(--purple-bg);margin-bottom:4px;">';
    h += '<div style="display:flex;align-items:center;gap:10px;">';
    h += '<div style="width:36px;height:36px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>';
    h += '<div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--purple);">'+group.name+'</div>';
    h += '<div style="font-family:var(--mono);font-size:10px;color:var(--text-tertiary);">ROOT · GROUP GOVERNANCE · '+(m.name)+' · '+group.member_count+' members</div></div>';
    h += '<div style="text-align:right;"><div style="font-family:var(--mono);font-size:14px;font-weight:700;color:'+(met?'var(--success)':'var(--warning)')+';">'+effectivePct+'%</div>';
    h += '<div style="font-family:var(--mono);font-size:9px;color:var(--text-quaternary);">QUORUM</div></div>';
    h += '</div></div>';
    
    // Tree lines to members
    treeMembers.forEach((mem, i) => {
        const email = (mem.email||'').toLowerCase();
        const vote = votes.find(v=>v.email===email);
        const isPresent = (session.present_members||[]).includes(email);
        const name = (mem.name||email.split('@')[0]).replace(/\b\w/g,c=>c.toUpperCase());
        const borderColor = vote ? (vote.vote==='approve' ? 'var(--success-border)' : vote.vote==='deny' ? 'var(--error-border)' : 'var(--warning-border)') : 'var(--border)';
        const bgColor = vote ? (vote.vote==='approve' ? 'var(--success-bg)' : vote.vote==='deny' ? 'var(--error-bg)' : 'var(--warning-bg)') : 'var(--surface-raised)';
        const dotColor = vote?.verified ? (isPresent ? 'var(--teal)' : 'var(--success)') : 'var(--text-quaternary)';
        const statusLabel = vote ? vote.vote.toUpperCase() + (vote.proxy ? ' (PROXY)' : '') : 'WAITING';
        const statusColor = vote ? (vote.vote==='approve' ? 'var(--success)' : 'var(--error)') : 'var(--text-quaternary)';
        
        h += '<div style="display:flex;align-items:stretch;margin-left:18px;">';
        h += '<div style="width:20px;display:flex;flex-direction:column;align-items:center;">';
        h += '<div style="width:1.5px;height:6px;background:var(--border);"></div>';
        h += '<div style="width:8px;height:1.5px;background:var(--border);margin-left:8px;"></div>';
        h += '</div>';
        h += '<div style="flex:1;border:1px solid '+borderColor+';border-radius:6px;padding:8px 12px;background:'+bgColor+';margin-bottom:2px;display:flex;align-items:center;gap:8px;">';
        h += '<div style="width:8px;height:8px;border-radius:50%;background:'+dotColor+';flex-shrink:0;'+(vote?.verified?'box-shadow:0 0 4px '+dotColor+';':'')+'"></div>';
        h += '<div style="flex:1;"><div style="font-size:12px;color:var(--text-primary);">'+name+'</div>';
        h += '<div style="font-family:var(--mono);font-size:9px;color:var(--text-quaternary);">'+email+(isPresent?' · ◉ Present':'')+(vote?.proxy?' · Proxy: '+vote.proxy.proxy_by:'')+'</div></div>';
        h += '<span style="font-family:var(--mono);font-size:10px;font-weight:600;color:'+statusColor+';">'+statusLabel+'</span>';
        h += '</div></div>';
    });
    
    // Agent delegation node (shows what happens after quorum)
    h += '<div style="display:flex;align-items:stretch;margin-left:18px;">';
    h += '<div style="width:20px;display:flex;flex-direction:column;align-items:center;">';
    h += '<div style="width:1.5px;height:6px;background:var(--border);"></div>';
    h += '<div style="width:8px;height:1.5px;background:var(--border);margin-left:8px;"></div>';
    h += '</div>';
    h += '<div style="flex:1;border:1px dashed '+(met?'var(--teal)':'var(--border)')+';border-radius:6px;padding:8px 12px;background:'+(met?'var(--teal-bg)':'var(--surface-raised)')+';margin-bottom:2px;display:flex;align-items:center;gap:8px;">';
    h += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+(met?'var(--teal)':'var(--text-quaternary)')+'" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="8" cy="12" r="1.5" fill="'+(met?'var(--teal)':'var(--text-quaternary)')+'"/><circle cx="16" cy="12" r="1.5" fill="'+(met?'var(--teal)':'var(--text-quaternary)')+'"/><path d="M9 2h6M12 2v4"/></svg>';
    if (met) {
        h += '<div style="flex:1;"><div style="font-size:12px;color:var(--teal);">Agent Authorized</div>';
        h += '<div style="font-family:var(--mono);font-size:9px;color:var(--text-quaternary);">Quorum met → Agent receives spending card · <a href="/agents?email='+encodeURIComponent(emailParam)+'" style="color:var(--teal);text-decoration:none;">Launch Agent →</a></div></div>';
    } else {
        h += '<div style="flex:1;"><div style="font-size:12px;color:var(--text-quaternary);">Agent Pending Authorization</div>';
        h += '<div style="font-family:var(--mono);font-size:9px;color:var(--text-quaternary);">Waiting for quorum before agent can receive spending card</div></div>';
    }
    h += '</div></div>';
    
    h += '<div style="font-family:var(--mono);font-size:9px;color:var(--text-quaternary);margin-top:8px;padding:6px 10px;background:var(--surface-raised);border-radius:4px;">Monotonic narrowing: group authority flows down the chain. Agent permissions can only restrict, never expand, without group re-vote.</div>';
    h += '</div></div>';

    h += '<div class="card"><div class="card-body"><div style="display:flex;align-items:center;gap:24px">';
    h += '<div class="quorum-ring"><svg viewBox="0 0 120 120"><circle class="quorum-ring-bg" cx="60" cy="60" r="52"/><circle class="quorum-ring-fill" cx="60" cy="60" r="52" stroke="'+ringColor+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+dashOff+'"/></svg><div class="quorum-ring-text"><div class="quorum-pct">'+effectivePct+'%</div><div class="quorum-label">'+(group.require_presence?'Present':'Approved')+'</div></div></div>';
    h += '<div style="flex:1"><div style="font-family:var(--mono);font-size:10px;color:var(--text-quaternary);margin-bottom:6px">THRESHOLD: '+threshPct+'%</div>';
    h += '<div style="font-family:var(--mono);font-size:12px;color:var(--text-secondary)">'+approvals.length+' of '+total+' verified approvals</div>';
    if (group.require_presence) h += '<div style="font-family:var(--mono);font-size:12px;color:var(--teal)">'+presentApprovals.length+' of '+total+' physically present</div>';
    h += '<div style="margin-top:8px;font-family:var(--mono);font-size:11px;font-weight:600;color:'+(met?'var(--success)':'var(--warning)')+';">'+(met?'\u2713 Quorum Met':'\u23F3 Quorum Not Yet Met')+'</div></div></div></div></div>';

    if (session.status === 'open') {
        const hasVoted = emailParam && votes.some(v=>v.email===emailParam.toLowerCase());
        if (hasVoted) {
            const mv = votes.find(v=>v.email===emailParam.toLowerCase());
            h += '<div class="card"><div class="card-body" style="text-align:center">';
            h += '<div style="font-family:var(--mono);font-size:12px;color:var(--text-tertiary)">You voted: <strong style="color:'+(mv.vote==='approve'?'var(--success)':'var(--error)')+'">'+mv.vote.toUpperCase()+'</strong></div>';
            h += '<div style="margin-top:8px;display:flex;gap:8px;justify-content:center;">';
            h += '<button class="btn" onclick="changeVote(\'approve\')" style="font-size:10px;padding:4px 10px;">Change to Approve</button>';
            h += '<button class="btn danger" onclick="changeVote(\'deny\')" style="font-size:10px;padding:4px 10px;">Change to Deny</button>';
            h += '</div></div></div>';
            // Demo: simulate other members voting
            const waitingMembers = (group.members_detail || group.members.map(e=>({email:e}))).filter(m => {
                const e = (m.email||'').toLowerCase();
                return !votes.some(v=>v.email===e);
            });
            if (waitingMembers.length > 0) {
                h += '<div class="card" style="border-color:var(--teal);"><div class="card-body">';
                h += '<div style="font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:1px;margin-bottom:6px;">PROXY VOTING · CLAIMS 168–241</div>';
                h += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;">Members who have granted you proxy authority. Vote on their behalf.</div>';
                
                // List each waiting member with proxy vote button
                waitingMembers.forEach(wm => {
                    const wname = (wm.name || wm.email.split('@')[0]).replace(/\b\w/g, c=>c.toUpperCase());
                    const wemail = wm.email || '';
                    const allowProxy = !group.require_presence; // Presence-required = no proxy
                    h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">';
                    h += '<div class="member-dot pending"></div>';
                    h += '<div style="flex:1"><div style="font-size:12px;color:var(--text-primary);">'+wname+'</div><div style="font-family:var(--mono);font-size:9px;color:var(--text-quaternary);">'+wemail+'</div></div>';
                    if (allowProxy) {
                        h += '<button class="btn success" onclick="proxyVote(\''+wemail+'\',\'approve\')" style="font-size:9px;padding:3px 8px;">Proxy Approve</button>';
                        h += '<button class="btn danger" onclick="proxyVote(\''+wemail+'\',\'deny\')" style="font-size:9px;padding:3px 8px;">Deny</button>';
                    } else {
                        h += '<span style="font-family:var(--mono);font-size:9px;color:var(--warning);">⊘ Presence required — no proxy</span>';
                    }
                    h += '</div>';
                });
                
                if (!group.require_presence) {
                    h += '<div style="margin-top:10px;display:flex;gap:8px;justify-content:center;">';
                    h += '<button class="btn success" onclick="simulateVotes(\'approve\')" style="font-size:10px;">All Proxies Approve</button>';
                    h += '<button class="btn danger" onclick="simulateVotes(\'deny\')" style="font-size:10px;">All Proxies Deny</button>';
                    h += '</div>';
                } else {
                    h += '<div style="margin-top:10px;font-family:var(--mono);font-size:10px;color:var(--warning);text-align:center;padding:6px;background:var(--warning-bg);border-radius:4px;">This governance model requires physical co-presence. Each member must vote from an approved location. <button class="btn" onclick="simulateNextVote(\'approve\')" style="font-size:9px;padding:3px 8px;margin-left:8px;">Simulate Present Vote</button></div>';
                }
                h += '</div></div>';
            }
        } else {
            h += '<div class="card"><div class="card-body"><div class="card-header">Cast Your Vote</div><div class="form-group"><label class="form-label">Your Email</label><input id="voteEmail" value="'+emailParam+'"></div>';
            if (group.require_presence) {
                h += '<div style="font-family:var(--mono);font-size:10px;color:var(--teal);margin-bottom:8px;padding:6px 10px;background:var(--teal-bg);border-radius:4px;display:flex;align-items:center;gap:8px;">';
                h += '<label style="cursor:pointer;display:flex;align-items:center;gap:6px;"><input type="checkbox" id="demoLocationOverride" checked> Demo Mode: simulate presence at '+(group.presence_location?.name||'meeting point')+'</label>';
                h += '</div>';
            }
            h += '<div class="vote-bar"><button class="btn success" onclick="submitVote(\'approve\')">\u2713 Approve</button><button class="btn danger" onclick="submitVote(\'deny\')">\u2717 Deny</button><button class="btn warn" onclick="submitVote(\'abstain\')">\u2014 Abstain</button></div></div></div>';
        }
    } else if (session.status === 'approved') {
        h += '<div class="card" style="border-color:var(--success-border)"><div class="card-body" style="text-align:center"><div style="font-size:20px;margin-bottom:4px">\u2713</div><div style="font-size:14px;font-weight:700;color:var(--success)">Decision Approved</div><div style="font-size:12px;color:var(--text-tertiary)">Quorum met. Decision recorded on-chain.</div></div></div>';
    }

    h += '<div class="section-title">Member Votes</div><div class="card"><div class="card-body">';
    const members = group.members_detail || group.members.map(e=>({email:e,name:e.split('@')[0]}));
    members.forEach(mem => {
        const email = (mem.email||'').toLowerCase();
        const vote = votes.find(v=>v.email===email);
        const isPresent = (session.present_members||[]).includes(email);
        const name = (mem.name||email.split('@')[0]).replace(/\b\w/g,c=>c.toUpperCase());
        const dotClass = vote?.verified?(isPresent?'present':'verified'):'pending';
        const voteClass = vote?vote.vote:'waiting';
        const voteLabel = vote ? (vote.proxy ? vote.vote.toUpperCase()+' (PROXY)' : vote.vote.toUpperCase()) : 'WAITING';
        const proxyNote = vote?.proxy ? '<div style="font-family:var(--mono);font-size:8px;color:var(--teal);">Proxy: '+vote.proxy.proxy_by+'</div>' : '';
        h += '<div class="member-row"><div class="member-dot '+dotClass+'"></div><div class="member-name">'+name+proxyNote+'</div><div class="member-meta">'+email+(vote?.trust_score?' \u00B7 '+(vote.trust_score*100).toFixed(0)+'%':'')+(group.require_presence?(isPresent?' \u00B7 ◉':' \u00B7 Remote'):'')+'</div><span class="member-vote '+voteClass+'">'+voteLabel+'</span></div>';
    });
    h += '</div></div>';
    h += '<div style="text-align:center;margin-top:24px"><div class="patent-badge"><span class="dot"></span>Claims 168\u2013241</div></div>';
    document.getElementById('content').innerHTML = h;
    document.getElementById('navStatus').textContent = 'GOVERNANCE SESSION';
}

async function submitVote(voteType) {
    const email = document.getElementById('voteEmail')?.value.trim();
    if (!email) { alert('Enter email'); return; }
    let loc = null;
    
    // Demo mode: override location to meeting point
    const demoOverride = document.getElementById('demoLocationOverride');
    if (demoOverride && demoOverride.checked && currentGroup?.presence_location) {
        const base = currentGroup.presence_location;
        loc = { lat: base.lat + (Math.random()-0.5)*0.001, lng: base.lng + (Math.random()-0.5)*0.001 };
    } else if (currentGroup?.require_presence && navigator.geolocation) {
        try { const p = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000})); loc = {lat:p.coords.latitude,lng:p.coords.longitude}; } catch(e){}
    }
    try {
        const d = await(await fetch(API+'/v1/groups/session/'+currentSession.session_id+'/vote', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,vote:voteType,location:loc}) })).json();
        if (d.session_id || d.status==='already_voted') await loadSession(currentSession.session_id);
        else alert(d.detail||'Vote failed');
    } catch(e) { alert(e.message); }
}

async function simulateNextVote(voteType) {
    if (!currentSession || !currentGroup) return;
    const votes = currentSession.votes || [];
    const votedEmails = votes.map(v => v.email);
    const members = currentGroup.members_detail || currentGroup.members.map(e => ({email: e}));
    const next = members.find(m => !votedEmails.includes((m.email||'').toLowerCase()));
    if (!next) return;
    // Simulate location near meeting point for presence-required groups
    let loc = null;
    if (currentGroup.require_presence && currentGroup.presence_location) {
        const base = currentGroup.presence_location;
        loc = { lat: base.lat + (Math.random()-0.5)*0.002, lng: base.lng + (Math.random()-0.5)*0.002 };
    }
    try {
        await fetch(API+'/v1/groups/session/'+currentSession.session_id+'/vote', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ email: next.email, vote: voteType, location: loc })
        });
        await loadSession(currentSession.session_id);
    } catch(e) { alert(e.message); }
}

async function simulateVotes(voteType) {
    if (!currentSession || !currentGroup) return;
    const votes = currentSession.votes || [];
    const votedEmails = votes.map(v => v.email);
    const members = currentGroup.members_detail || currentGroup.members.map(e => ({email: e}));
    const waiting = members.filter(m => !votedEmails.includes((m.email||'').toLowerCase()));
    for (const mem of waiting) {
        let loc = null;
        if (currentGroup.require_presence && currentGroup.presence_location) {
            const base = currentGroup.presence_location;
            loc = { lat: base.lat + (Math.random()-0.5)*0.002, lng: base.lng + (Math.random()-0.5)*0.002 };
        }
        await fetch(API+'/v1/groups/session/'+currentSession.session_id+'/vote', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ email: mem.email, vote: voteType, location: loc })
        });
    }
    await loadSession(currentSession.session_id);
}

async function changeVote(newVote) {
    if (!currentSession) return;
    try {
        await fetch(API+'/v1/groups/session/'+currentSession.session_id+'/vote', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ email: emailParam, vote: newVote, change_vote: true })
        });
        await loadSession(currentSession.session_id);
    } catch(e) { alert(e.message); }
}

async function proxyVote(memberEmail, voteType) {
    if (!currentSession) return;
    try {
        await fetch(API+'/v1/groups/session/'+currentSession.session_id+'/vote', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ email: memberEmail, vote: voteType, proxy_by: emailParam })
        });
        await loadSession(currentSession.session_id);
    } catch(e) { alert(e.message); }
}

async function cancelSession() {
    if (!currentSession) return;
    const reason = prompt('Reason for cancellation (optional):') || 'Cancelled by initiator';
    try {
        await fetch(API+'/v1/groups/session/'+currentSession.session_id+'/cancel', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ reason, cancelled_by: emailParam })
        });
        await loadSession(currentSession.session_id);
    } catch(e) { alert(e.message); }
}

init();
</script>
