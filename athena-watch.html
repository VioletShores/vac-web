<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Send to Athena</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: #0D0F17;
  color: #e8eaf0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.app { max-width: 480px; margin: 0 auto; padding: 24px 16px 48px; }

.header { margin-bottom: 28px; }
.header h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.2px; }
.header p { font-size: 13px; color: #9498A8; margin-top: 4px; }

.field { margin-bottom: 14px; }
.field input[type="url"],
.field textarea {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: inherit;
  font-size: 16px;
  color: #e8eaf0;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
}
.field input[type="url"]:focus,
.field textarea:focus {
  border-color: #C9A84C;
  background: rgba(201,168,76,0.05);
}
.field input::placeholder,
.field textarea::placeholder { color: #6B7084; }
.field textarea { resize: none; height: 80px; line-height: 1.5; font-size: 15px; }

.tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.tag {
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: #9498A8;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.tag:active { transform: scale(0.96); }
.tag.on {
  background: rgba(201,168,76,0.12);
  border-color: #C9A84C;
  color: #C9A84C;
}

.btn {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  background: #C9A84C;
  border: none;
  color: #0D0F17;
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.2px;
}
.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.99); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.result {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 10px;
  border-left: 3px solid #34d399;
  background: rgba(52,211,153,0.07);
  display: none;
}
.result.err {
  border-color: #f87171;
  background: rgba(248,113,113,0.07);
}
.result.show { display: block; }
.result-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #34d399;
  margin-bottom: 6px;
}
.result.err .result-label { color: #f87171; }
.result-text { font-size: 14px; line-height: 1.55; color: #e8eaf0; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(13,15,23,0.3);
  border-top-color: #0D0F17;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Send to Athena</h1>
    <p>paste a link, add a note, tag it</p>
  </div>

  <div class="field">
    <input type="url" id="url" placeholder="https://…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>

  <div class="field">
    <textarea id="note" placeholder="note (optional)"></textarea>
  </div>

  <div class="tags">
    <button class="tag" data-tag="bitcoin">bitcoin</button>
    <button class="tag" data-tag="product">product</button>
    <button class="tag" data-tag="competitor">competitor</button>
    <button class="tag" data-tag="interesting">interesting</button>
    <button class="tag" data-tag="watch later">watch later</button>
  </div>

  <button class="btn" id="submit-btn" onclick="submit()">Send to Athena</button>

  <div class="result" id="result">
    <div class="result-label" id="result-label"></div>
    <div class="result-text" id="result-text"></div>
  </div>

</div>
<script>
const selectedTags = new Set();

document.querySelectorAll('.tag').forEach(t => {
  t.addEventListener('click', () => {
    const tag = t.dataset.tag;
    if (selectedTags.has(tag)) {
      selectedTags.delete(tag);
      t.classList.remove('on');
    } else {
      selectedTags.add(tag);
      t.classList.add('on');
    }
  });
});

async function submit() {
  const url = document.getElementById('url').value.trim();
  if (!url) { document.getElementById('url').focus(); return; }

  const btn = document.getElementById('submit-btn');
  const result = document.getElementById('result');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending…';
  result.className = 'result';

  const payload = {
    url,
    note: document.getElementById('note').value.trim() || undefined,
    tags: selectedTags.size ? [...selectedTags] : undefined,
    user_id: 'rob',
  };

  try {
    const res = await fetch('https://api.athenapilot.ai/v1/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      show('err', 'Error', esc(data.detail || data.message || `HTTP ${res.status}`));
    } else {
      const summary = data.summary || data.content || data.result || 'Saved.';
      show('ok', 'Saved', esc(summary));
      document.getElementById('url').value = '';
      document.getElementById('note').value = '';
      selectedTags.clear();
      document.querySelectorAll('.tag').forEach(t => t.classList.remove('on'));
    }
  } catch {
    show('err', 'Error', 'Could not reach Athena. Check your connection.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send to Athena';
  }
}

function show(type, label, text) {
  const el = document.getElementById('result');
  el.className = 'result show' + (type === 'err' ? ' err' : '');
  document.getElementById('result-label').textContent = label;
  document.getElementById('result-text').innerHTML = text;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Pre-fill from query param
const params = new URLSearchParams(location.search);
const preUrl = params.get('url') || params.get('text');
if (preUrl) {
  document.getElementById('url').value = preUrl;
}
</script>
</body>
</html>
